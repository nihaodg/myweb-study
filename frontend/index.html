<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF-Web 漏洞学习平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen bg-gray-900 text-gray-200">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 border-r border-gray-700 flex-shrink-0">
            <div class="p-6 border-b border-gray-700">
                <div class="flex items-center gap-3">
                    <i data-lucide="shield-alert" class="w-8 h-8 text-blue-400"></i>
                    <span class="text-xl font-bold text-white">CTF-Web</span>
                </div>
            </div>
            <nav class="p-4" id="sidebar-nav">
                <!-- Nav items will be rendered here -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8 overflow-y-auto">
            <div class="max-w-5xl mx-auto">
                <!-- Header -->
                <header class="text-center pb-8 mb-8 border-b border-gray-700">
                    <h1 class="text-3xl font-bold text-white mb-2">漏洞学习平台</h1>
                    <p class="text-gray-400">点击左侧导航或下方卡片开始学习</p>
                </header>

                <!-- Category Content -->
                <div id="category-content" class="mb-10">
                    <!-- Will show selected category or all -->
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-gray-900/95 flex items-center justify-center z-50">
        <div class="text-center">
            <i data-lucide="loader-2" class="w-16 h-16 text-blue-400 animate-spin mx-auto mb-4"></i>
            <p class="text-gray-400 text-lg">加载中...</p>
        </div>
    </div>

    <script>
        let vulnerabilities = [];
        let activeCategory = 'all';

        async function loadVulnerabilities() {
            try {
                const response = await fetch('assets/js/vulnerabilities.json');
                const data = await response.json();
                vulnerabilities = data.vulnerabilities;
                renderSidebar();
                showAllCategories();
            } catch (error) {
                console.error('Failed to load vulnerabilities:', error);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function getIcon(iconName) {
            const iconMap = {
                'database': 'database',
                'code': 'code',
                'refresh-cw': 'refresh-cw',
                'terminal': 'terminal',
                'globe': 'globe',
                'upload': 'upload',
                'lock': 'lock',
                'file-code': 'file-code',
                'box': 'box',
                'cpu': 'cpu'
            };
            return iconMap[iconName] || 'alert-circle';
        }

        function getColorClass(color) {
            const classes = {
                'red': 'text-red-400 bg-red-500/20 border-red-500/50',
                'yellow': 'text-yellow-400 bg-yellow-500/20 border-yellow-500/50',
                'purple': 'text-purple-400 bg-purple-500/20 border-purple-500/50',
                'blue': 'text-blue-400 bg-blue-500/20 border-blue-500/50',
                'orange': 'text-orange-400 bg-orange-500/20 border-orange-500/50',
                'cyan': 'text-cyan-400 bg-cyan-500/20 border-cyan-500/50',
                'green': 'text-green-400 bg-green-500/20 border-green-500/50',
                'pink': 'text-pink-400 bg-pink-500/20 border-pink-500/50',
                'indigo': 'text-indigo-400 bg-indigo-500/20 border-indigo-500/50'
            };
            return classes[color] || 'text-gray-400 bg-gray-500/20 border-gray-500/50';
        }

        function getColorClassSimple(color) {
            const classes = {
                'red': 'border-red-500',
                'yellow': 'border-yellow-500',
                'purple': 'border-purple-500',
                'blue': 'border-blue-500',
                'orange': 'border-orange-500',
                'cyan': 'border-cyan-500',
                'green': 'border-green-500',
                'pink': 'border-pink-500',
                'indigo': 'border-indigo-500'
            };
            return classes[color] || 'border-gray-500';
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            let html = `
                <button onclick="showAllCategories()" 
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg mb-2 transition-all ${activeCategory === 'all' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-700 hover:text-white'}">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i>
                    <span class="font-medium">全部模块</span>
                </button>
            `;

            vulnerabilities.forEach(v => {
                const isActive = activeCategory === v.id;
                html += `
                    <button onclick="showCategory('${v.id}')" 
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-lg mb-2 transition-all ${isActive ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-700 hover:text-white'}">
                        <i data-lucide="${getIcon(v.icon)}" class="w-5 h-5"></i>
                        <span class="font-medium">${v.name}</span>
                    </button>
                `;
            });

            nav.innerHTML = html;
            lucide.createIcons();
        }

        function showAllCategories() {
            activeCategory = 'all';
            renderSidebar();
            const content = document.getElementById('category-content');
            content.innerHTML = vulnerabilities.map(v => renderCategoryCard(v)).join('');
            lucide.createIcons();
        }

        function showCategory(id) {
            activeCategory = id;
            renderSidebar();
            const v = vulnerabilities.find(x => x.id === id);
            if (v) {
                const content = document.getElementById('category-content');
                content.innerHTML = renderCategoryCard(v);
                lucide.createIcons();
            }
        }

        function renderCategoryCard(v) {
            const hasChildren = v.children && v.children.length > 0;
            return `
                <div class="bg-gray-800 rounded-2xl border ${getColorClassSimple(v.color)} p-6 mb-8">
                    <div class="flex items-center gap-4 mb-5">
                        <div class="w-12 h-12 rounded-xl ${getColorClass(v.color)} border-2 flex items-center justify-center">
                            <i data-lucide="${getIcon(v.icon)}" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-white">${v.name}</h2>
                            <p class="text-gray-500 text-sm">${v.name_en}</p>
                        </div>
                    </div>
                    ${hasChildren ? `
                        <div class="grid grid-cols-3 gap-3">
                            ${v.children.map(child => `
                                <a href="vulnerability/${child.id}/index.html" 
                                   class="flex items-center justify-between bg-gray-900/50 rounded-xl border border-gray-700 px-4 py-3 hover:border-blue-500 hover:bg-gray-900 transition-all group">
                                    <span class="text-gray-300 group-hover:text-white font-medium">${child.name}</span>
                                    <i data-lucide="chevron-right" class="w-4 h-4 text-gray-600 group-hover:text-blue-400"></i>
                                </a>
                            `).join('')}
                        </div>
                    ` : `
                        <a href="vulnerability/${v.id}/index.html" 
                           class="flex items-center justify-between bg-gray-900/50 rounded-xl border border-gray-700 px-5 py-4 hover:border-blue-500 hover:bg-gray-900 transition-all group">
                            <span class="text-gray-300 group-hover:text-white font-medium">点击进入学习</span>
                            <i data-lucide="chevron-right" class="w-5 h-5 text-gray-600 group-hover:text-blue-400"></i>
                        </a>
                    `}
                </div>
            `;
        }

        loadVulnerabilities();
    </script>
</body>
</html>
