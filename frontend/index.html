<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF-Web 漏洞学习平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen bg-gray-900 text-gray-200">
    <div class="max-w-7xl mx-auto px-6 py-10 space-y-10">
        <!-- Header -->
        <header class="text-center pb-8 border-b border-gray-700">
            <div class="flex items-center justify-center gap-4 mb-4">
                <i data-lucide="shield-alert" class="w-12 h-12 text-blue-400"></i>
                <h1 class="text-4xl font-bold text-white">CTF-Web 漏洞学习平台</h1>
            </div>
            <p class="text-gray-400 text-lg">交互式学习 Web 安全漏洞的原理、复现与修复</p>
            <p class="text-gray-500 text-sm mt-2">点击任意模块开始学习</p>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-gray-800 rounded-xl border border-gray-700 p-5 text-center hover:border-blue-500 transition-all">
                <div class="text-3xl font-bold text-blue-400" id="total-count">0</div>
                <div class="text-sm text-gray-500 mt-1">漏洞总数</div>
            </div>
            <div class="bg-gray-800 rounded-xl border border-gray-700 p-5 text-center hover:border-red-500 transition-all">
                <div class="text-3xl font-bold text-red-400" id="high-count">0</div>
                <div class="text-sm text-gray-500 mt-1">高危漏洞</div>
            </div>
            <div class="bg-gray-800 rounded-xl border border-gray-700 p-5 text-center hover:border-yellow-500 transition-all">
                <div class="text-3xl font-bold text-yellow-400" id="medium-count">0</div>
                <div class="text-sm text-gray-500 mt-1">中危漏洞</div>
            </div>
            <div class="bg-gray-800 rounded-xl border border-gray-700 p-5 text-center hover:border-green-500 transition-all">
                <div class="text-3xl font-bold text-green-400" id="low-count">0</div>
                <div class="text-sm text-gray-500 mt-1">低危漏洞</div>
            </div>
        </div>

        <!-- Vulnerability Categories -->
        <div id="vulnerability-list" class="space-y-8">
        </div>

        <!-- Footer -->
        <footer class="border-t border-gray-700 pt-8 text-center text-gray-500 text-sm">
            <p>CTF-Web 漏洞学习平台 | 仅供学习交流，请勿用于非法用途</p>
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-gray-900/95 flex items-center justify-center z-50">
        <div class="text-center">
            <i data-lucide="loader-2" class="w-16 h-16 text-blue-400 animate-spin mx-auto mb-4"></i>
            <p class="text-gray-400 text-lg">加载中...</p>
        </div>
    </div>

    <script>
        let vulnerabilities = [];
        
        async function loadVulnerabilities() {
            try {
                const response = await fetch('assets/js/vulnerabilities.json');
                const data = await response.json();
                vulnerabilities = data.vulnerabilities;
                renderVulnerabilities();
                updateStats();
            } catch (error) {
                console.error('Failed to load vulnerabilities:', error);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }
        
        function getIcon(iconName) {
            const iconMap = {
                'database': 'database',
                'code': 'code',
                'refresh-cw': 'refresh-cw',
                'terminal': 'terminal',
                'globe': 'globe',
                'upload': 'upload',
                'lock': 'lock',
                'file-code': 'file-code',
                'box': 'box',
                'cpu': 'cpu'
            };
            return iconMap[iconName] || 'alert-circle';
        }
        
        function getColorClass(color) {
            const classes = {
                'red': 'text-red-400 bg-red-500/20 border-red-500/50',
                'yellow': 'text-yellow-400 bg-yellow-500/20 border-yellow-500/50',
                'purple': 'text-purple-400 bg-purple-500/20 border-purple-500/50',
                'blue': 'text-blue-400 bg-blue-500/20 border-blue-500/50',
                'orange': 'text-orange-400 bg-orange-500/20 border-orange-500/50',
                'cyan': 'text-cyan-400 bg-cyan-500/20 border-cyan-500/50',
                'green': 'text-green-400 bg-green-500/20 border-green-500/50',
                'pink': 'text-pink-400 bg-pink-500/20 border-pink-500/50',
                'indigo': 'text-indigo-400 bg-indigo-500/20 border-indigo-500/50'
            };
            return classes[color] || 'text-gray-400 bg-gray-500/20 border-gray-500/50';
        }
        
        function renderVulnerabilities() {
            const container = document.getElementById('vulnerability-list');
            container.innerHTML = vulnerabilities.map(v => {
                const hasChildren = v.children && v.children.length > 0;
                return `
                <div class="bg-gray-800/50 rounded-2xl border border-gray-700 p-6 hover:border-gray-600 transition-all">
                    <div class="flex items-center gap-4 mb-5">
                        <div class="w-14 h-14 rounded-xl ${getColorClass(v.color)} border-2 flex items-center justify-center">
                            <i data-lucide="${getIcon(v.icon)}" class="w-7 h-7"></i>
                        </div>
                        <div class="flex-1">
                            <h2 class="text-2xl font-bold text-white mb-1">${v.name}</h2>
                            <p class="text-gray-500 text-sm">${v.name_en}</p>
                        </div>
                    </div>
                    ${hasChildren ? `
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                            ${v.children.map(child => `
                                <a href="vulnerability/${child.id}/index.html" 
                                   class="flex items-center justify-between bg-gray-900/50 rounded-xl border border-gray-700 px-4 py-3 hover:border-blue-500 hover:bg-gray-900 transition-all group">
                                    <span class="text-gray-300 group-hover:text-white font-medium">${child.name}</span>
                                    <i data-lucide="chevron-right" class="w-5 h-5 text-gray-600 group-hover:text-blue-400 transition-colors"></i>
                                </a>
                            `).join('')}
                        </div>
                    ` : `
                        <a href="vulnerability/${v.id}/index.html" 
                           class="flex items-center justify-between bg-gray-900/50 rounded-xl border border-gray-700 px-5 py-4 hover:border-blue-500 hover:bg-gray-900 transition-all group">
                            <span class="text-gray-300 group-hover:text-white font-medium">点击进入学习</span>
                            <i data-lucide="chevron-right" class="w-5 h-5 text-gray-600 group-hover:text-blue-400 transition-colors"></i>
                        </a>
                    `}
                </div>
                `;
            }).join('');
            lucide.createIcons();
        }
        
        function updateStats() {
            document.getElementById('total-count').textContent = vulnerabilities.length;
            document.getElementById('high-count').textContent = vulnerabilities.filter(v => v.difficulty === 'high').length;
            document.getElementById('medium-count').textContent = vulnerabilities.filter(v => v.difficulty === 'medium').length;
            document.getElementById('low-count').textContent = vulnerabilities.filter(v => v.difficulty === 'low').length;
        }
        
        // Initialize
        loadVulnerabilities();
    </script>
</body>
</html>
